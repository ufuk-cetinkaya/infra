apiVersion: batch/v1
kind: Job
metadata:
  name: ebelgedb-migration
  namespace: edonusum
spec:
  template:
    spec:
      containers:
      - name: ebelgedb-migration
        image: ghcr.io/ufuk-cetinkaya/document-api:latest
        imagePullPolicy: IfNotPresent
        args: ["migrate"]
        envFrom:
        - secretRef:
            name: ebelgedb-secret
      restartPolicy: Never
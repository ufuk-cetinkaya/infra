apiVersion: batch/v1
kind: Job
metadata:
  name: gibuserdb-migration
  namespace: edonusum
spec:
  template:
    spec:
      containers:
      - name: gibuserdb-migration
        image: ghcr.io/ufuk-cetinkaya/gib-user-api:latest
        imagePullPolicy: IfNotPresent
        args: ["migrate"]
        envFrom:
        - secretRef:
            name: gibuserdb-secret
      restartPolicy: Never
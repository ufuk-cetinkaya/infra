apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: services
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: gib-user-api=ghcr.io/ufuk-cetinkaya/gib-user-api
    argocd-image-updater.argoproj.io/gib-user-api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/gib-user-api.pull-secret: pullsecret:argocd/ghcr-secret
    argocd-image-updater.argoproj.io/write-back-method: git

spec:
  project: default
  source:
    repoURL: https://github.com/ufuk-cetinkaya/infra.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true